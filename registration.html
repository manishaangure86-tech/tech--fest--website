<!DOCTYPE html>
<html>
  <head>
    <title>Registration-TCM Tech Fest 2026</title>
    </head>
    <body>
      <h1>TCM Tech Fest2026-Registration</h1>
      <hr>
      <h2>Registration Form</h2>
      <form>
        <label>Full Name:</label><br>
  <input type="text"name="Fullname"placeholder="Enter full name"required><br><br>
  <label>Email:</label><br>
  <input type="email"name="email"placeholder="Enter email"required><br><br>
  <label>Phone:</label><br>
  <input type="tel" name="phone"placeholder="Enter phone number"required><br><br>
  <label>Gender:</label><br>
  <input type="radio" name="gender"value="Male">Male
  <input type="radio"name="gender"value="Female">Female
  <input type="radio"name="gender" value="Other">Other<br><br>
  <label>Department:</label><br>
  <input type="text"name="department"placeholder="Enter department"><br><br>
  <label>Year:</label><br>
  <select name="year>"
  <option value="">Select Year</option>
  <option value="1st year">1st year</option>
  <option value="2nd year">2nd year</option>
  <option value="3rd year">3rd year</option>
  <option value="4th year">4th year</option>
</select><br><br>
<label>Domain:</label><br>
<input type="checkbox" name="domain"value="Web Development">Web Development<br>
<input type="checkbox" name="domain"value="AI/ML">AI/ML<br>
<input type="checkbox" name="domain"value="Cybersecurity">Web Cybersecurity<br><br>
<label>Experience:</label><br>
<input type="text"name="experience"placeholder="Beginner/Intermediate/Expert"><br><br>
<label>City:</label><br>
<input type="text"name="city"placeholder="Enter your city"><br><br>
<label>Message:</label><br>
<textarea rows="4"cols="40"name="Message"placeholder="Why do you want to participate?"></textarea>
<br><br>
<input type="submit"value="value=Register Now">
<input type="reset"value="Clear Form"
</form>
